version: '3.8'

services:
  evolution_api:
    image: evoapicloud/evolution-api:v2.1.1
    container_name: petshop_evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=NODE
      - SERVER_PORT=8080
      - DB_TYPE=SQLITE
      - AUTHENTICATION_API_KEY=petshop_secreto_123
      - CONFIG_SESSION_KEY=petshop_secreto_123_sessao
    volumes:
      - evolution_data:/evolution/storage

volumes:
  evolution_data:
